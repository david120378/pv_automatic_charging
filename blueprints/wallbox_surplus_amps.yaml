# ============================================================
# Blueprint: Wallbox – Überschussladen – Ampere anpassen
# Version:   0.2.0
# Changelog:
#   0.2.0 – Einspeisung-Puffer, Netzbezug-Sensor, Großverbraucher-Sensor,
#            Benachrichtigung (nur bei ≥2A Änderung)
#   0.1.0 – Initiale Version (Einspeisung + Ladeleistung)
# ============================================================
blueprint:
  name: "Wallbox: Überschussladen – Ampere anpassen"
  description: >
    Passt den Ladestrom laufend an den verfügbaren Solar-Überschuss an,
    solange der Modus "Überschussladen" aktiv ist und geladen wird.

    **Berechnung:**
    (Einspeisung + Ladeleistung − Netzbezug − Großverbraucher − Puffer) / (Phasen × 230V)

    - **Einspeisung-Puffer:** Stabilisiert die Regelung bei schwankender Solarproduktion.
    - **Netzbezug-Sensor (optional):** FOX-ESS Grid-Consumption Sensor. Berücksichtigt
      aktuelle Netzentnahme anderer Verbraucher im Haushalt.
    - **Großverbraucher-Sensor (optional):** Summiert die Leistung weiterer
      Großverbraucher (z.B. Wärmepumpe + Geschirrspüler) als Template-Sensor.

    **Mindestladestrom:** 6A. **Maximum:** 32A.

    Wird zusammen mit "Modus-Steuerung", "Starten" und "Stoppen" verwendet.
  domain: automation
  author: david120378
  homeassistant:
    min_version: "2023.4.0"
  input:
    mode_selector:
      name: Lademodus-Auswahl
      description: Derselbe Dropdown-Helfer wie im Blueprint "Modus-Steuerung".
      selector:
        entity:
          domain: input_select

    wallbox_switch:
      name: Wallbox Lade-Schalter
      selector:
        entity:
          domain: switch

    wallbox_charge_amps:
      name: Wallbox Ladestrom (Zahl-Entity)
      description: (z.B. number.SERIAL_charge_amps aus dem evseMQTT Add-on)
      selector:
        entity:
          domain: number

    feedin_sensor:
      name: Solar-Einspeisung Sensor
      description: Sensor für die aktuelle Einspeisung ins Netz in Watt (FOX-ESS).
      selector:
        entity:
          domain: sensor
          device_class: power

    current_energy_sensor:
      name: Wallbox Aktuelle Ladeleistung
      description: >
        Sensor für die aktuelle Ladeleistung der Wallbox in Watt.
        (z.B. sensor.SERIAL_current_energy aus dem evseMQTT Add-on)
      selector:
        entity:
          domain: sensor

    phases:
      name: Anzahl Ladephasen
      default: "3"
      selector:
        select:
          options:
            - label: "3-phasig (3 × 230V, Divisor 690)"
              value: "3"
            - label: "1-phasig (1 × 230V, Divisor 230)"
              value: "1"

    puffer_watt:
      name: Einspeisung-Puffer (Watt)
      description: >
        Pufferwert der vom Überschuss abgezogen wird. Stabilisiert die Regelung.
        Sollte denselben Wert wie im Blueprint "Starten" haben. Standard: 200 W
      default: 200
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: W

    grid_sensor:
      name: Netzbezug-Sensor (optional)
      description: >
        Entity-ID des FOX-ESS Netzbezug-Sensors in Watt (z.B. sensor.fox_ess_grid_consumption_power).
        Wenn angegeben, wird der aktuelle Netzbezug in die Berechnung einbezogen,
        sodass Lasten anderer Geräte automatisch berücksichtigt werden.
        Leer lassen wenn nicht vorhanden.
      default: ""
      selector:
        text: {}

    extra_load_sensor:
      name: Großverbraucher-Sensor (optional)
      description: >
        Entity-ID eines Sensors der die Summe der Leistung aller Großverbraucher
        in Watt anzeigt (z.B. ein Template-Sensor der Wärmepumpe + Geschirrspüler summiert).
        Leer lassen wenn nicht vorhanden.
      default: ""
      selector:
        text: {}

    notify_service:
      name: Benachrichtigungs-Dienst (optional)
      description: >
        Wird nur gesendet wenn sich der Ladestrom um mehr als 2A ändert.
        Leer lassen für keine Benachrichtigung.
      default: ""
      selector:
        text: {}

variables:
  phases_count: !input phases
  feedin_entity: !input feedin_sensor
  energy_entity: !input current_energy_sensor
  puffer_w: !input puffer_watt
  grid_entity: !input grid_sensor
  extra_entity: !input extra_load_sensor
  notify_svc: !input notify_service

trigger:
  - platform: state
    entity_id: !input feedin_sensor

condition:
  - condition: state
    entity_id: !input mode_selector
    state: "Überschussladen"

  - condition: state
    entity_id: !input wallbox_switch
    state: "on"

action:
  - variables:
      feedin_w: "{{ states(feedin_entity) | float(0) }}"
      current_charge_w: "{{ states(energy_entity) | float(0) }}"
      grid_w: "{{ states(grid_entity) | float(0) if grid_entity != '' else 0 }}"
      extra_w: "{{ states(extra_entity) | float(0) if extra_entity != '' else 0 }}"
      divisor: "{{ phases_count | int * 230 }}"
      # Gesamtüberschuss: Einspeisung + Eigene Ladeleistung - Netzbezug - Großverbraucher - Puffer
      available_w: "{{ feedin_w + current_charge_w - grid_w - extra_w - puffer_w }}"
      target_amps: "{{ [[available_w / divisor, 6] | max, 32] | min | int }}"
      current_amps: "{{ states(wallbox_charge_amps_entity) | float(0) }}"

  - variables:
      wallbox_charge_amps_entity: !input wallbox_charge_amps

  - service: number.set_value
    target:
      entity_id: !input wallbox_charge_amps
    data:
      value: "{{ target_amps }}"

  - if:
      - condition: template
        value_template: >
          {{ notify_svc != '' and
             (target_amps - current_amps) | abs >= 2 }}
    then:
      - service: "{{ notify_svc }}"
        data:
          title: "⚡ Wallbox: Ladestrom angepasst"
          message: "Ladestrom: {{ target_amps }}A (Überschuss: {{ available_w | int }}W)"

mode: single
