# ============================================================
# Wallbox Dashboard-Karte
# ============================================================
#
# VORAUSSETZUNGEN (einmalig in HA erstellen):
#
#   1. Helfer "Wallbox Modus" (Dropdown):
#      Einstellungen → Helfer → + Helfer → Dropdown
#      Name: "Wallbox Modus"
#      Optionen: Off | Manuell | Überschussladen
#      → Entity-ID: input_select.wallbox_modus
#
#   2. Helfer "Wallbox SOC Schwellwert" (Zahl):
#      Einstellungen → Helfer → + Helfer → Zahl
#      Name: "Wallbox SOC Schwellwert"
#      Min: 0 | Max: 100 | Schrittweite: 5 | Einheit: %
#      Icon: mdi:battery-charging
#      → Entity-ID: input_number.wallbox_soc_schwellwert
#
# KARTE EINFÜGEN:
#   Dashboard → Bearbeiten → + Karte → Manuell (YAML) → einfügen
#
# PLATZHALTER ERSETZEN:
#   SERIAL    → Wallbox-Seriennummer aus evseMQTT
#               (z.B. aus Entity switch.ABC123_charge → SERIAL = ABC123)
#
# AUTOS ANPASSEN:
#   Im visuellen HA-Karten-Editor unter "Autos" Zeilen per Dropdown
#   hinzufügen, entfernen oder die Entity-IDs ändern.
#
# ============================================================

type: vertical-stack
cards:

  # ── Wallbox Steuerung ──────────────────────────────────────
  - type: entities
    title: Wallbox
    entities:

      # Modus: erscheint als Dropdown-Menü (Off / Manuell / Überschussladen)
      - entity: input_select.wallbox_modus
        name: Lademodus
        icon: mdi:ev-station

      # SOC-Schwellwert: erscheint als Schieberegler 0–100%
      # Laden im Überschussmodus startet nur wenn PV-SOC ≥ diesem Wert
      - entity: input_number.wallbox_soc_schwellwert
        name: PV-Batterie Schwellwert
        icon: mdi:battery-charging

      # Ladestrom: im Manuell-Modus manuell einstellbar,
      # im Überschussladen-Modus wird er automatisch gesetzt
      - entity: number.SERIAL_charge_amps
        name: Ladestrom
        icon: mdi:current-ac

      # Lade-Schalter: im Manuell-Modus manuell steuerbar
      - entity: switch.SERIAL_charge
        name: Laden aktiv
        icon: mdi:ev-plug-type2

      # Stecker-Status: zeigt ob ein Auto angesteckt ist
      - entity: sensor.SERIAL_plug_state
        name: Stecker
        icon: mdi:power-plug

      # Aktueller Ladestatus der Wallbox
      - entity: sensor.SERIAL_current_state
        name: Ladestatus
        icon: mdi:information-outline

  # ── Auto-Status ────────────────────────────────────────────
  # Zeigt alle Autos mit SOC und Ladestatus.
  # Im visuellen HA-Editor Zeilen per Dropdown hinzufügen/tauschen.
  - type: glance
    title: Autos
    columns: 2
    show_state: true
    entities:

      # ── Tesla ───────────────────────────────────────────────
      # Typische Entity-IDs der Tesla Integration:
      #   sensor.NAME_battery_level         (SOC in %)
      #   sensor.NAME_charging_state        ("Charging" / "Disconnected" / "Stopped")
      - entity: sensor.TESLA_battery_level
        name: Tesla – Akku
        icon: mdi:battery-charging-80

      - entity: sensor.TESLA_charging_state
        name: Tesla – Status
        icon: mdi:ev-plug-tesla

      # ── BMW / Mini ──────────────────────────────────────────
      # Typische Entity-IDs der BMW ConnectedDrive Integration:
      #   sensor.NAME_remaining_battery_percent   (SOC in %)
      #   binary_sensor.NAME_charging_status      (on = lädt / off = nicht laden)
      - entity: sensor.BMW_remaining_battery_percent
        name: Mini – Akku
        icon: mdi:battery-charging-80

      - entity: binary_sensor.BMW_charging_status
        name: Mini – Status
        icon: mdi:car-electric

      # ── Weiteres Auto ───────────────────────────────────────
      # Einfach weitere Zeilen im visuellen Editor hinzufügen:
      # - entity: sensor.AUTO3_battery_level
      #   name: Auto 3 – Akku
      # - entity: sensor.AUTO3_charging_state
      #   name: Auto 3 – Status
